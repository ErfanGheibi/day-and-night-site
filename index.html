<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day&Night — Sunrise & Sunset Times</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-left">
	<span class="site-logo">Day&Night</span>
    </div>
    <div class="header-right">
      <a href="about.html" class="about-btn">About</a>
      <button id="theme-toggle" class="theme-btn">Auto</button>
    </div>
  </header>

  <main class="main-content">

    <!-- Sun Progress Bar -->
    <section class="sunbar-section">
      <div class="sunbar-meta">
        <span class="sunbar-label" id="sunrise-label">Sunrise <span id="sunrise-time">—</span></span>
        <span class="sunbar-center-label" id="sunbar-location-label">Your Location</span>
        <span class="sunbar-label" id="sunset-label">Sunset <span id="sunset-time">—</span></span>
      </div>
      <div class="sunbar-track" id="sunbar-track">
        <div class="sunbar-fill" id="sunbar-fill"></div>
        <div class="sun-icon" id="sun-icon">☀</div>
        <div class="sunbar-horizon sunbar-horizon-left"></div>
        <div class="sunbar-horizon sunbar-horizon-right"></div>
      </div>
    </section>

    <!-- Search Bar -->
    <section class="search-section">
      <div class="search-inner">
        <input
          type="text"
          id="location-input"
          class="location-input"
          placeholder="Search a city — London, Tokyo, New York..."
          autocomplete="off"
        />
        <button id="search-btn" class="search-btn">
          <span class="search-btn-text">Search</span>
          <span class="search-btn-spinner" id="search-spinner" hidden>○</span>
        </button>
      </div>
      <div class="search-error" id="search-error" hidden></div>
    </section>

    <!-- 20-Day Table -->
    <section class="table-section">
      <div class="table-header-row">
        <span class="table-title" id="table-title">20-Day Sun Table</span>
        <span class="table-subtitle" id="table-subtitle">Search a location to begin</span>
      </div>
      <div class="table-scroll-container" id="table-container">
        <table class="sun-table" id="sun-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>TimeZone</th>
              <th>Sunrise</th>
              <th>Sunset</th>
              <th>Day Length</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr class="table-empty-row">
              <td colspan="5">
                <div class="empty-state">
                  <div class="empty-icon">◌</div>
                  <div>Search a city to see 20 days of sunrise &amp; sunset data</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
